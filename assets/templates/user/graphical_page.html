{% extends 'user/design.html' %}
{% block userblock %}
{% load static %}

<style>
    .chart-card {
        border-radius: 16px;
        overflow: hidden;
    }

    #chartContainer {
        background: rgba(255, 255, 255, 0.97);
        border-radius: 12px;
        padding: 1rem;
    }
</style>

<h2 class="page-heading"><span>Graphical Analysis</span></h2>

<div class="card chart-card">
    <div class="card-title">Blockchain — Location Wise Analysis</div>
    <div id="chartContainer" style="height: 420px; width: 100%;"></div>
</div>

<script>
window.onload = function() {
    var chart = new CanvasJS.Chart("chartContainer", {
        animationEnabled: true,
        theme: "light2",
        title: {
            text: "Blockchain - Location Wise Analysis",
            fontFamily: "Inter",
            fontSize: 18,
            fontWeight: "bold"
        },
        data: [{
        {% if chart_type == "bar" %}
            type: "bar",
        {% elif chart_type == "pie" %}
            type: "pie",
        {% elif chart_type == "spline" %}
            type: "spline",
        {% endif %}
            startAngle: 240,
            yValueFormatString: "##0.00\"%\"",
            indexLabel: "{label} {y}",
            dataPoints: [
            {% for o in obj %}
                {y: {{o.dcount}}, label: "{{o.location}}"},
            {% endfor %}
            ]
        }]
    });
    chart.render();
}
</script>

<script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>

{% endblock %}
