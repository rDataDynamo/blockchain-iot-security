{% extends 'user/design.html' %}
{% block userblock %}
{% load static %}

<style>
    .otp-container {
        max-width: 550px;
        margin: 0 auto;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-label {
        display: block;
        font-weight: 600;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        margin-bottom: 0.5rem;
    }

    .submit-row {
        text-align: center;
        margin-top: 2rem;
    }

    .web-alert {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.4);
        color: #fca5a5;
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
        text-align: center;
        display: none;
    }

    .web-alert.active {
        display: block;
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(-5px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<h2 class="page-heading"><span>Hash Code Validation</span></h2>

<div class="otp-container">
    <div class="card">
        <div class="card-title">Enter Verification Code</div>

        <div id="error-alert" class="web-alert {% if sts and sts != 'c' %}active{% endif %}">
            {% if sts and sts != 'c' %}{{ sts }}{% endif %}
        </div>

        <form method="post" onsubmit="return validateForm()">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">Please enter Hash Code value</label>
                <input type="text" name="otp" id="id_otp" placeholder="Enter your hash code">
            </div>

            <div class="submit-row">
                <input type="submit" name="submit" value="Verify Code">
            </div>
        </form>
    </div>
</div>

<script>
    function validateForm() {
        var otpValue = document.getElementById("id_otp").value.trim();
        var errorAlert = document.getElementById("error-alert");

        if (otpValue === "") {
            errorAlert.textContent = "OTP cannot be empty! Please enter your code.";
            errorAlert.classList.add("active");
            return false; // Prevent form submission
        }

        errorAlert.classList.remove("active");
        return true;
    }
</script>

{% endblock %}
