<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — IoT Security System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #070b14;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .bg-animated {
            position: fixed; inset: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(79,172,254,0.07), transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(0,242,254,0.07), transparent 45%);
            pointer-events: none;
        }
        .grid-overlay {
            position: fixed; inset: -50%;
            background-image:
                linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: scale(1.5) rotateX(60deg);
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }
        @keyframes gridMove {
            0%   { transform: scale(1.5) rotateX(60deg) translateY(0); }
            100% { transform: scale(1.5) rotateX(60deg) translateY(60px); }
        }

        .login-box {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            background: rgba(13,19,36,0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0,242,254,0.05);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .shield-icon { font-size: 52px; text-align: center; margin-bottom: 16px; }

        .brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 900;
            text-align: center;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            font-size: 12px;
            color: #64748b;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 36px;
        }

        .error-msg {
            background: rgba(255,71,87,0.1);
            border: 1px solid rgba(255,71,87,0.35);
            color: #ff6b81;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.09);
            padding: 12px 16px;
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.25s;
        }
        input:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 14px rgba(0,242,254,0.2);
        }
        input::placeholder { color: #334155; }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #070b14;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 800;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 8px;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(0,242,254,0.25);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,242,254,0.4);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: #475569;
            font-size: 13px;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: #00f2fe; }

        .hint {
            margin-top: 24px;
            padding: 12px 16px;
            background: rgba(0,242,254,0.05);
            border: 1px solid rgba(0,242,254,0.12);
            border-radius: 8px;
            font-size: 12px;
            color: #475569;
            text-align: center;
            line-height: 1.6;
        }
        .hint strong { color: #00f2fe; }
    </style>
</head>
<body>
<div class="bg-animated"></div>
<div class="grid-overlay"></div>

<div class="login-box">
    <div class="shield-icon">🛡️</div>
    <div class="brand">ADMIN PORTAL</div>
    <div class="subtitle">IoT Security System</div>

    {% if error %}
    <div class="error-msg">❌ {{ error }}</div>
    {% endif %}

    <form method="POST" action="{% url 'admin_login' %}">
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Admin Username</label>
            <input type="text" id="username" name="username" placeholder="Enter admin username" required autocomplete="off">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter admin password" required>
        </div>
        <button type="submit" class="btn-login">🔐 Login to Dashboard</button>
    </form>

    <a href="/" class="back-link">← Back to Home</a>

    <div class="hint">
        Default credentials:<br>
        <strong>Username:</strong> admin &nbsp;|&nbsp; <strong>Password:</strong> admin123
    </div>
</div>
</body>
</html>
