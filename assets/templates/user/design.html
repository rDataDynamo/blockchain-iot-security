
<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain IoT Security</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #7c3aed;
            --dark: #070b14;
            --dark-card: rgba(13, 19, 36, 0.75);
            --text: #e2e8f0;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --glow: rgba(0, 242, 254, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark);
            min-height: 100vh;
            color: var(--text);
            position: relative;
            overflow-x: hidden;
        }

        /* === Animated background === */
        .bg-animated {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 10% 20%, rgba(79, 172, 254, 0.08), transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 254, 0.08), transparent 40%);
            z-index: 0;
            pointer-events: none;
        }

        .grid-overlay {
            position: fixed;
            inset: -50%;
            background-image:
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            transform: scale(1.5) rotateX(60deg);
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { transform: scale(1.5) rotateX(60deg) translateY(0); }
            100% { transform: scale(1.5) rotateX(60deg) translateY(60px); }
        }

        /* === Top Navigation Bar === */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(7, 11, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
        }

        .topbar-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            white-space: nowrap;
        }

        .logo span {
            font-size: 0.65rem;
            display: block;
            letter-spacing: 3px;
            background: none;
            -webkit-text-fill-color: var(--text-muted);
            font-weight: 500;
            margin-top: 2px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        nav a:hover {
            color: var(--primary);
            background: rgba(0, 242, 254, 0.08);
        }

        nav a.logout-btn {
            margin-left: 0.5rem;
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        nav a.logout-btn:hover {
            background: rgba(239, 68, 68, 0.25);
            color: #fca5a5;
        }

        /* === Page Content Area === */
        .page-wrapper {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            min-height: calc(100vh - 70px);
        }

        /* === Shared Card Styles === */
        .card {
            background: var(--dark-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(0, 242, 254, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 20px var(--glow);
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        /* === Shared Table Styles === */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        th {
            background: rgba(0, 242, 254, 0.08);
            color: var(--primary);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 1rem 1.2rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th:first-child { border-radius: 10px 0 0 0; }
        th:last-child { border-radius: 0 10px 0 0; }

        td {
            padding: 0.9rem 1.2rem;
            font-size: 0.92rem;
            color: var(--text);
            border-bottom: 1px solid var(--border);
            background: transparent;
        }

        tr:hover td {
            background: rgba(0, 242, 254, 0.04);
        }

        tr:last-child td { border-bottom: none; }

        /* === Shared Form Inputs === */
        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(0, 242, 254, 0.25);
            background: rgba(0, 0, 0, 0.45);
        }

        input::placeholder { color: #475569; }

        input[type="file"] {
            background: rgba(0, 0, 0, 0.25);
            border: 1px dashed rgba(255, 255, 255, 0.15);
            padding: 0.7rem 1rem;
            border-radius: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        input[type="file"]:hover {
            border-color: var(--primary);
            background: rgba(0, 242, 254, 0.05);
        }

        input[type="submit"], button[type="submit"] {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: #070b14;
            border: none;
            padding: 0.85rem 2.5rem;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 6px 15px rgba(0, 242, 254, 0.25);
        }

        input[type="submit"]:hover, button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 242, 254, 0.4);
        }

        /* === Links inside tables === */
        td a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            border: 1px solid rgba(0, 242, 254, 0.25);
            transition: all 0.25s;
            font-size: 0.82rem;
        }

        td a:hover {
            background: rgba(0, 242, 254, 0.12);
            box-shadow: 0 0 12px rgba(0, 242, 254, 0.2);
        }

        /* === Marquee replacement === */
        .page-heading {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            color: white;
            margin-bottom: 2rem;
            letter-spacing: 3px;
        }

        .page-heading span {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

<div class="bg-animated"></div>
<div class="grid-overlay"></div>

<!-- Top Navigation Bar -->
<div class="topbar">
    <div class="topbar-inner">
        <div class="logo">
            BLOCKCHAIN
            <span>Securing IoT Data</span>
        </div>
        <nav>
            <a href="{% url 'mydetail' %}">My Details</a>
            <a href="{% url 'userpage' %}">Upload Data</a>
            <a href="{% url 'viewdata' %}">View Data</a>
            <a href="{% url 'graphical_page' %}">Analytics</a>
            <a href="{% url 'admin_login' %}" style="color:#ff9f43;border:1px solid rgba(255,159,67,0.3);padding:0.4rem 0.9rem;border-radius:8px;">🛡️ Admin</a>
            <a href="{% url 'index' %}" class="logout-btn">Logout</a>
        </nav>
    </div>
</div>

<!-- Page Content -->
<div class="page-wrapper">
    {% block userblock %}
    {% endblock %}
</div>

</body>
</html>
